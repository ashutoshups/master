<div class="container-fluid p-0">
  <!-- Enhanced Angular Tabs -->
  <div class="tabs-container">
    <ul class="nav nav-tabs justify-content-center" role="tablist">
      <li class="nav-item" role="presentation">
        <button
          class="nav-link"
          [class.active]="activeTab === 'registration'"
          [attr.aria-selected]="activeTab === 'registration'"
          [attr.aria-controls]="'registration-tab'"
          id="registration-tab-button"
          (click)="setActiveTab('registration')"
          type="button"
          role="tab"
          tabindex="0">
          <div class="tab-content-wrapper">
            <svg width="20" height="20" fill="currentColor" class="tab-icon" viewBox="0 0 16 16">
              <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/>
              <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319z"/>
            </svg>
            <div class="tab-text">
              <span class="tab-title">User Registration</span>
              <span class="tab-subtitle">Create Account</span>
            </div>
            <div class="tab-indicator" *ngIf="activeTab === 'registration'">
              <div class="pulse-dot"></div>
            </div>
          </div>
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button
          class="nav-link"
          [class.active]="activeTab === 'users'"
          [attr.aria-selected]="activeTab === 'users'"
          [attr.aria-controls]="'users-tab'"
          id="users-tab-button"
          (click)="setActiveTab('users')"
          type="button"
          role="tab"
          tabindex="0">
          <div class="tab-content-wrapper">
            <svg width="20" height="20" fill="currentColor" class="tab-icon" viewBox="0 0 16 16">
              <path d="M7 14s-1 0-1-1 1-4 5-4 5 3 5 4-1 1-1 1H7zm4-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
              <path fill-rule="evenodd" d="M5.216 14A2.238 2.238 0 0 1 5 13c0-1.355.68-2.75 1.936-3.72A6.325 6.325 0 0 0 5 9c-4 0-5 3-5 4s1 1 1 1h4.216z"/>
              <path d="M4.5 8a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5z"/>
            </svg>
            <div class="tab-text">
              <span class="tab-title">Registered Users</span>
              <span class="tab-subtitle">View Directory</span>
            </div>
            <div class="tab-indicator" *ngIf="activeTab === 'users'">
              <div class="pulse-dot"></div>
            </div>
          </div>
        </button>
      </li>
    </ul>
  </div>

  <div class="tab-content">
    <div class="tab-pane tab-panel" id="registration-tab" aria-labelledby="registration-tab-button" [hidden]="activeTab !== 'registration'" [class.active]="activeTab === 'registration'" role="tabpanel">
      <app-registration></app-registration>
    </div>
    <div class="tab-pane tab-panel" id="users-tab" aria-labelledby="users-tab-button" [hidden]="activeTab !== 'users'" [class.active]="activeTab === 'users'" role="tabpanel">
      <app-users></app-users>
    </div>
  </div>
</div>
